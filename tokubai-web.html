<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の特売レシピ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F4651E;
    --orange-dark: #e8430a;
    --orange-light: #FFF0E8;
    --dark: #1a1a1a;
    --gray: #f5f5f5;
    --border: #eee;
    --sub: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; overflow-x: hidden; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ヘッダー */
  .header {
    width: 100%;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 12px rgba(244,101,30,0.3);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-icon {
    width: 34px; height: 34px;
    background: white;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .header-title { font-size: 14px; font-weight: 900; color: white; }
  .header-sub { font-size: 10px; color: rgba(255,255,255,0.8); display: none; }
  .header-right { margin-left: auto; display: flex; gap: 6px; flex-shrink: 0; }
  .ng-btn {
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.4);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .ng-btn:hover { background: rgba(255,255,255,0.3); }

  /* メインレイアウト */
  .main {
    width: 100%;
    max-width: 680px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 0 120px;
  }

  /* チャットエリア */
  .chat-area {
    flex: 1;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: calc(100vh - 160px);
  }

  /* メッセージ */
  .msg {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .msg-avatar.bot { background: var(--orange); }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 13px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.bot {
    background: white;
    color: var(--dark);
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .bubble.user {
    background: var(--orange);
    color: white;
    border-radius: 18px 18px 4px 18px;
  }

  /* タイピング */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 18px;
    background: white;
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    width: fit-content;
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--orange);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* クイックリプライ */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
    margin-left: 34px;
  }
  .qr-btn {
    background: white;
    border: 1.5px solid var(--orange);
    color: var(--orange);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    box-shadow: 0 2px 6px rgba(244,101,30,0.1);
    -webkit-tap-highlight-color: transparent;
  }
  .qr-btn:active { background: var(--orange); color: white; }

  /* 入力エリア */
  .input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    max-width: 680px;
    margin: 0 auto;
    background: white;
    border-top: 1px solid var(--border);
    padding: 8px 12px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  }

  /* 料理タイプ選択 */
  .type-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .type-btn {
    flex: 1;
    padding: 6px 4px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--sub);
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .type-btn.active {
    border-color: var(--orange);
    background: var(--orange-light);
    color: var(--orange);
  }

  .input-wrap {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .input-box {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 10px 14px;
    font-size: 16px;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
    -webkit-appearance: none;
  }
  .input-box:focus { border-color: var(--orange); }
  .send-btn {
    width: 44px; height: 44px;
    background: var(--orange);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.15s;
    box-shadow: 0 4px 12px rgba(244,101,30,0.35);
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  .send-btn:hover { transform: scale(1.08); background: var(--orange-dark); }
  .send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* 前回入力バナー */
  .resume-banner {
    background: var(--orange-light);
    border: 1px solid rgba(244,101,30,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #555;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 4px;
    animation: fadeIn 0.3s ease;
  }
  .resume-banner-text { line-height: 1.6; }
  .resume-banner-text strong { color: var(--orange); font-weight: 700; }
  .resume-use-btn {
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* PC */
  @media (min-width: 680px) {
    .header-sub { display: block; }
    .input-area { left: 50%; transform: translateX(-50%); right: auto; width: 680px; }
  }

  /* モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 16px; font-weight: 900; margin-bottom: 6px; }
  .modal p { font-size: 12px; color: var(--sub); margin-bottom: 16px; line-height: 1.7; }
  .modal textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    height: 80px;
    outline: none;
    margin-bottom: 14px;
  }
  .modal textarea:focus { border-color: var(--orange); }
  .modal-current {
    background: var(--orange-light);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--orange);
    font-weight: 700;
    margin-bottom: 14px;
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }
  .modal-btn.cancel { background: var(--gray); color: var(--dark); }
  .modal-btn.save { background: var(--orange); color: white; }
  .modal-btn:hover { opacity: 0.85; }

  /* ウェルカム */
  .welcome {
    text-align: center;
    padding: 36px 16px;
  }
  .welcome-icon { font-size: 52px; margin-bottom: 12px; }
  .welcome h2 { font-size: 19px; font-weight: 900; margin-bottom: 16px; color: var(--dark); }

  /* コンセプトカード */
  .concept-card {
    margin: 0 auto 24px;
    max-width: 340px;
    background: #fafafa;
    border: 1px solid #e8e8e8;
    border-left: 3px solid var(--orange);
    border-radius: 0 10px 10px 0;
    padding: 12px 16px;
    text-align: left;
    animation: fadeIn 0.5s ease;
  }
  .concept-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 2px;
    margin-bottom: 7px;
  }
  .concept-text {
    font-size: 12px;
    color: #555;
    line-height: 1.9;
  }
  .concept-text strong { color: var(--dark); font-weight: 700; }

  .welcome-start {
    background: var(--orange);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(244,101,30,0.35);
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .welcome-start:hover { transform: translateY(-2px); }
  .welcome-help {
    background: white;
    color: var(--orange);
    border: 2px solid var(--orange);
    padding: 10px 24px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 12px;
    display: inline-block;
  }
  .welcome-help:hover { background: var(--orange-light); }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div class="header-icon">🛒</div>
  <div>
    <div class="header-title">今日の特売レシピ</div>
    <div class="header-sub">特売品を入力するだけで今夜の献立を提案</div>
  </div>
  <div class="header-right">
    <button class="ng-btn" onclick="openNgModal()">🚫 NG食材</button>
    <button class="ng-btn" onclick="openFavModal()">⭐ お気に入り</button>
    <button class="ng-btn" onclick="window.open(FEEDBACK_URL,'_blank')">📝 フィードバック</button>
  </div>
</div>

<!-- メイン -->
<div class="main">
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🍳</div>
      <h2>今日の特売品は何ですか？</h2>
      <div class="concept-card">
        <div class="concept-label">このツールについて</div>
        <div class="concept-text" id="conceptText"></div>
      </div>
      <button class="welcome-start" onclick="startChat()">特売品を入力する</button><br>
      <button class="welcome-help" onclick="showHelp()">📖 使い方を見る</button>
    </div>
  </div>

  <!-- 入力エリア -->
  <div class="input-area" id="inputArea" style="display:none;">
    <!-- 料理タイプ選択 -->
    <div class="type-bar" id="typeBar">
      <button class="type-btn active" data-type="おまかせ" onclick="selectType(this)">おまかせ</button>
      <button class="type-btn" data-type="メイン" onclick="selectType(this)">🍽 メイン</button>
      <button class="type-btn" data-type="スープ" onclick="selectType(this)">🍲 スープ</button>
      <button class="type-btn" data-type="おつまみ" onclick="selectType(this)">🍺 おつまみ</button>
    </div>
    <div class="input-wrap">
      <textarea class="input-box" id="inputBox" placeholder="例：鶏もも肉、大根、豆腐" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#8679;</button>
    </div>
  </div>
</div>

<!-- お気に入りモーダル -->
<div class="modal-overlay" id="favModal">
  <div class="modal" style="max-height:80vh;overflow-y:auto;">
    <h3>⭐ お気に入りレシピ</h3>
    <p>保存したレシピ一覧です。</p>
    <div id="favList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px;"></div>
    <button class="modal-btn cancel" onclick="closeFavModal()" style="width:100%;">閉じる</button>
  </div>
</div>

<!-- NGモーダル -->
<div class="modal-overlay" id="ngModal">
  <div class="modal">
    <h3>🚫 NG食材の設定</h3>
    <p>使いたくない食材を入力してください。<br>「、」か改行で区切ると複数登録できます。</p>
    <div class="modal-current" id="ngCurrent" style="display:none;"></div>
    <textarea id="ngInput" placeholder="例：ピーマン、魚、レバー"></textarea>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeNgModal()">キャンセル</button>
      <button class="modal-btn save" onclick="saveNg()">登録する</button>
    </div>
  </div>
</div>

<script>
const FEEDBACK_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdWBvgjjlzoOlWv9FXozXFe7cfghORLH0ghBn0xRu-Cy-gOxw/viewform?usp=publish-editor';

// ============================================================
// 状態管理
// ============================================================
const state = {
  items: [],
  shown: [],
  lastRecipe: null,
  lastRecipeText: '',
  selectedType: 'おまかせ',
  ngFoods: load('ngFoods', []),
  cookedRecipes: load('cookedRecipes', []),
  recipeHistory: load('recipeHistory', []), // 直近提案履歴（重複防止用）
  recipeCount: parseInt(localStorage.getItem('recipeCount') || '0'),
  waiting: false,
};

function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(def)); }
  catch(e) { return def; }
}

function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function saveStorage() {
  save('ngFoods', state.ngFoods);
  save('cookedRecipes', state.cookedRecipes);
  save('recipeHistory', state.recipeHistory.slice(-20)); // 直近20件
}

function getRecentCooked() {
  const oneMonthAgo = Date.now() - 30 * 24 * 60 * 60 * 1000;
  return state.cookedRecipes.filter(r => r.cookedAt > oneMonthAgo).map(r => r.name);
}

// ============================================================
// 当日の入力保持
// ============================================================
function saveTodayItems(items) {
  const today = new Date().toDateString();
  save('todayItems', { date: today, items });
}

function loadTodayItems() {
  try {
    const data = JSON.parse(localStorage.getItem('todayItems') || 'null');
    if (!data) return null;
    if (data.date !== new Date().toDateString()) return null;
    return data.items;
  } catch(e) { return null; }
}

// ============================================================
// 料理タイプ選択
// ============================================================
function selectType(btn) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.selectedType = btn.dataset.type;
}

// ============================================================
// コンセプトローテーション
// ============================================================
const CONCEPTS = [
  '今日の献立を考える余裕がない日に。\n<strong>特売品から、今すぐ1品だけ決めるためのツール</strong>です。',
  'レシピをたくさん比べるより、まず1品決めたい人へ。\n<strong>忙しい日の買い物中に使うことを想定</strong>しています。',
  'このツールは、料理好きのための検索サービスではありません。\n「<strong>考える手間を減らしたい日</strong>」のための、時短用レシピ提案です。',
];

function showConcept() {
  try {
    const idx = parseInt(localStorage.getItem('conceptIdx') || '0') % CONCEPTS.length;
    document.getElementById('conceptText').innerHTML = CONCEPTS[idx].replace(/\n/g, '<br>');
    localStorage.setItem('conceptIdx', (idx + 1) % CONCEPTS.length);
  } catch(e) {
    document.getElementById('conceptText').innerHTML = CONCEPTS[0].replace(/\n/g, '<br>');
  }
}

// ============================================================
// チャット開始
// ============================================================
function startChat() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('inputArea').style.display = 'block';

  // 当日入力の引き継ぎ確認
  const todayItems = loadTodayItems();
  if (todayItems && todayItems.length > 0) {
    state.items = todayItems;
    const area = document.getElementById('chatArea');
    const banner = document.createElement('div');
    banner.className = 'resume-banner';
    banner.innerHTML = `
      <div class="resume-banner-text">前回の入力を引き継いでいます：<br><strong>${todayItems.join('、')}</strong></div>
      <button class="resume-use-btn" onclick="useResume(this.parentElement)">このまま使う</button>
    `;
    area.appendChild(banner);
  } else {
    addBotMessage('今日の特売品を教えてください！\n（複数ある場合は「、」か改行で区切ってください）\n\n例：鶏もも肉、大根、豆腐\n\n👆 画面下部の入力欄から送ってください');
  }
  document.getElementById('inputBox').focus();
}

function useResume(banner) {
  banner.remove();
  const ngText = state.ngFoods.length > 0 ? `\nNG食材：${state.ngFoods.join('、')}` : '';
  const typeText = state.selectedType !== 'おまかせ' ? `\n料理タイプ：${state.selectedType}` : '';
  addBotMessage(`特売品を受け取りました！\n${state.items.map(i => `・${i}`).join('\n')}${ngText}${typeText}\n\nレシピを考えています…`);
  processRecipe(state.items);
}

// ============================================================
// メッセージ送信
// ============================================================
async function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text || state.waiting) return;
  input.value = '';
  autoResize(input);
  await handleInput(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ============================================================
// 入力処理
// ============================================================
async function handleInput(text) {
  addUserMessage(text);
  setWaiting(true);

  // お気に入り
  if (text === 'お気に入り' || text === '⭐ お気に入り') {
    if (state.lastRecipe) {
      const favorites = load('favorites', []);
      const exists = favorites.find(f => f.name === state.lastRecipe);
      if (!exists) {
        favorites.push({ name: state.lastRecipe, savedAt: Date.now(), text: state.lastRecipeText });
        save('favorites', favorites);
        addBotMessage(`⭐ 「${state.lastRecipe}」をお気に入りに追加しました！`);
      } else {
        addBotMessage(`「${state.lastRecipe}」はすでにお気に入りに登録されています。`);
      }
    } else {
      addBotMessage('レシピが提案されていません。');
    }
    setWaiting(false);
    return;
  }

  // 作った
  if (text === '作った') {
    if (state.lastRecipe) {
      state.cookedRecipes.push({ name: state.lastRecipe, cookedAt: Date.now() });
      state.lastRecipe = null;
      saveStorage();
      addBotMessage('ありがとうございます！\n1ヶ月間はこのレシピを除外しますね。\nまた特売品を教えてください！');
    } else {
      addBotMessage('レシピがまだ提案されていません。');
    }
    setWaiting(false);
    return;
  }

  // 作らなかった
  if (text === '作らなかった') {
    state.lastRecipe = null;
    addBotMessage('わかりました！\n「別のレシピ」で他のレシピを見るか、食材を入力し直してください。');
    showQuickReplies(['🔄 別のレシピ', '↩️ リセット']);
    setWaiting(false);
    return;
  }

  // 別のレシピ
  if (text === '別のレシピ' || text === '🔄 別のレシピ') {
    if (state.items.length > 0) {
      addBotMessage('別のレシピを考えています…');
      const exclude = [...state.shown, ...getRecentCooked(), ...state.recipeHistory.map(r => r.name)];
      const recipe = await getRecipe(state.items, exclude);
      if (recipe) {
        state.shown.push(recipe.name);
        state.lastRecipe = recipe.name;
        state.lastRecipeText = formatRecipe(recipe);
        addBotMessage(formatRecipe(recipe));
        showQuickReplies(['✅ 作った', '⏭ 作らなかった', '🔄 別のレシピ', '⭐ お気に入り', '↩️ リセット']);
      }
    } else {
      addBotMessage('まず特売品を教えてください！');
    }
    setWaiting(false);
    return;
  }

  // リセット
  if (text === 'リセット' || text === '↩️ リセット') {
    state.items = [];
    state.shown = [];
    state.lastRecipe = null;
    localStorage.removeItem('chatHistory');
    localStorage.removeItem('chatState');
    addBotMessage('食材を入力し直しますね！\n今日の特売品を教えてください。');
    setWaiting(false);
    return;
  }

  // 追加
  if (text.startsWith('追加') || text.startsWith('＋') || text.startsWith('+')) {
    const addText = text.replace(/^(追加|＋|\+)\s*/, '');
    const newItems = addText.split(/[\n、,，]+/).map(s => s.trim()).filter(s => s.length > 0);
    if (newItems.length > 0 && state.items.length > 0) {
      state.items = [...state.items, ...newItems].slice(0, 8);
      saveTodayItems(state.items);
      state.shown = [];
      state.lastRecipe = null;
      const ngText = state.ngFoods.length > 0 ? `\nNG食材：${state.ngFoods.join('、')}` : '';
      addBotMessage(`食材を追加しました！\n${state.items.map(i => `・${i}`).join('\n')}${ngText}\n\nレシピを考えています…`);
      await processRecipe(state.items);
    } else if (state.items.length === 0) {
      addBotMessage('まず特売品を入力してください！');
    }
    setWaiting(false);
    return;
  }

  // 食材入力
  const items = text.split(/[\n、,，]+/).map(s => s.trim()).filter(s => s.length > 0).slice(0, 8);
  if (items.length === 0) {
    addBotMessage('食材を入力してください\n\n例：鶏もも肉、大根、豆腐');
    setWaiting(false);
    return;
  }

  state.items = items;
  state.shown = [];
  state.lastRecipe = null;
  saveTodayItems(items);

  const ngText = state.ngFoods.length > 0 ? `\nNG食材：${state.ngFoods.join('、')}` : '';
  const typeText = state.selectedType !== 'おまかせ' ? `\n料理タイプ：${state.selectedType}` : '';
  addBotMessage(`特売品を受け取りました！\n${items.map(i => `・${i}`).join('\n')}${ngText}${typeText}\n\nレシピを考えています…`);

  await processRecipe(items);
  setWaiting(false);
}

async function processRecipe(items) {
  const recentCooked = getRecentCooked();
  const exclude = [...(state.shown || []), ...recentCooked, ...state.recipeHistory.map(r => r.name)];
  const recipe = await getRecipe(items, exclude);
  if (recipe) {
    state.shown = [recipe.name];
    state.lastRecipe = recipe.name;
    state.lastRecipeText = formatRecipe(recipe);

    // 履歴に追加（重複防止用）
    state.recipeHistory.push({ name: recipe.name, style: recipe.style || '', method: recipe.method || '' });
    saveStorage();

    addBotMessage(formatRecipe(recipe));

    // 余り食材
    const leftover = await getLeftoverSuggestion(items, recipe.ingredients);
    if (leftover?.suggestions?.length > 0) {
      const suggText = leftover.suggestions.map(s => `・${s.type}｜${s.name}\n  ${s.desc}`).join('\n');
      addBotMessage(`余った食材の活用アイデア\n\n${suggText}`);
    }

    showQuickReplies(['✅ 作った', '⏭ 作らなかった', '🔄 別のレシピ', '⭐ お気に入り', '↩️ リセット']);

    // 10回ごとにフィードバック促進
    state.recipeCount++;
    localStorage.setItem('recipeCount', state.recipeCount);
    if (state.recipeCount % 10 === 0) {
      setTimeout(() => {
        addBotMessage(`🎉 レシピを${state.recipeCount}回提案しました！\nいつもご利用ありがとうございます。\nぜひフィードバックをお聞かせください！`);
        const area = document.getElementById('chatArea');
        const div = document.createElement('div');
        div.className = 'quick-replies';
        const btn = document.createElement('button');
        btn.className = 'qr-btn';
        btn.style.cssText = 'background:#F4651E;color:white;border-color:#F4651E;';
        btn.textContent = '📝 フィードバックを送る';
        btn.onclick = () => window.open(FEEDBACK_URL, '_blank');
        div.appendChild(btn);
        area.appendChild(div);
        scrollBottom();
      }, 1000);
    }
  } else {
    addBotMessage('申し訳ありません、レシピの取得に失敗しました。もう一度試してみてください。');
  }
}

// ============================================================
// API呼び出し
// ============================================================
async function callClaude(prompt, maxTokens = 1000) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, maxTokens })
  });
  const data = await res.json();
  const text = data.content.map(i => i.text || '').join('');
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

async function getRecipe(items, exclude) {
  const excludeText = exclude.length > 0 ? `\n- 以下は除外（提案済み・最近作った）: 【${exclude.join('、')}】` : '';
  const ngText = state.ngFoods.length > 0 ? `\n- NG食材（絶対に使わない）: 【${state.ngFoods.join('、')}】` : '';
  const typeText = state.selectedType !== 'おまかせ' ? `\n- 料理タイプ：${state.selectedType}を提案すること` : '';

  // 直近の味付け・調理法を取得して偏り防止
  const recentStyles = state.recipeHistory.slice(-3).map(r => r.style).filter(Boolean);
  const recentMethods = state.recipeHistory.slice(-3).map(r => r.method).filter(Boolean);
  const diversityText = recentStyles.length > 0
    ? `\n- 直近の味付け系統【${recentStyles.join('、')}】と異なる味付けを優先\n- 直近の調理法【${recentMethods.join('、')}】と異なる調理法を優先`
    : '';

  try {
    return await callClaude(`以下の特売食材を使った夕食レシピを1品提案してください。
特売食材: ${items.join('、')}
対象: 40代、共働き、家族持ちのお母さん。疲れていても作れる、家族が喜ぶもの。

【重要なルール】
- 入力された特売食材はできるだけ全部使うこと（最優先）
- 特売食材＋家にある基本的な調味料で作れるレシピを優先
- 特別な食材や珍しい調味料が必要なレシピは避ける
- 和洋中・様々なジャンルから提案すること${typeText}${excludeText}${ngText}${diversityText}

必ずJSONのみで返してください（説明文なし）:
{
  "name": "料理名",
  "time": "調理時間",
  "desc": "ポイント（50字以内）",
  "ingredients": ["材料1", "材料2"],
  "steps": ["手順1", "手順2"],
  "style": "味付け系統（例：甘辛、塩味、トマト系、など1語）",
  "method": "調理法（例：炒める、煮る、焼く、など1語）"
}`);
  } catch(e) { return null; }
}

async function getLeftoverSuggestion(allItems, usedIngredients) {
  const usedNames = usedIngredients.map(i => i.replace(/[（(].*[)）]/g, '').replace(/\s+\S+$/, '').trim());
  const leftover = allItems.filter(item => !usedNames.some(u => u.includes(item) || item.includes(u)));
  if (leftover.length === 0) return null;
  try {
    return await callClaude(`以下の余り食材で副菜・汁物・作り置きを1〜2個提案してください。
余り食材: ${leftover.join('、')}
必ずJSONのみ: {"suggestions":[{"type":"副菜/汁物/作り置き","name":"料理名","desc":"一言（30字以内）"}]}`, 500);
  } catch(e) { return null; }
}

function formatRecipe(r) {
  return `【${r.name}】\n時間：${r.time}\n\n${r.desc}\n\n【材料】\n${r.ingredients.map(i => `・${i}`).join('\n')}\n\n【作り方】\n${r.steps.map((s,i) => `${i+1}. ${s}`).join('\n')}`;
}

// ============================================================
// UI操作
// ============================================================
function addUserMessage(text, restore = false) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble user">${escHtml(text)}</div>`;
  area.appendChild(div);
  scrollBottom();
  if (!restore) saveChatHistory();
}

function addBotMessage(text, restore = false) {
  removeTyping();
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="msg-avatar bot">🍳</div><div class="bubble bot">${escHtml(text)}</div>`;
  area.appendChild(div);
  scrollBottom();
  if (!restore) saveChatHistory();
}

function showQuickReplies(labels) {
  document.getElementById('quickReplies')?.remove();
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'quick-replies';
  div.id = 'quickReplies';
  labels.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = label;
    btn.onclick = () => {
      document.getElementById('quickReplies')?.remove();
      const cmdMap = {'✅ 作った':'作った','⏭ 作らなかった':'作らなかった','🔄 別のレシピ':'別のレシピ','⭐ お気に入り':'お気に入り','↩️ リセット':'リセット'};
      handleInput(cmdMap[label] || label);
    };
    div.appendChild(btn);
  });
  area.appendChild(div);
  scrollBottom();
}

function setWaiting(val) {
  state.waiting = val;
  const btn = document.getElementById('sendBtn');
  if (btn) btn.disabled = val;
  if (val) showTyping();
  else removeTyping();
}

function showTyping() {
  removeTyping();
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingMsg';
  div.innerHTML = `<div class="msg-avatar bot">🍳</div><div class="typing"><span></span><span></span><span></span></div>`;
  area.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  document.getElementById('typingMsg')?.remove();
}

function scrollBottom() {
  setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 50);
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ============================================================
// チャット履歴の保存・復元
// ============================================================
function saveChatHistory() {
  const msgs = [...document.querySelectorAll('.msg')].slice(-50).map(el => ({
    type: el.classList.contains('user') ? 'user' : 'bot',
    text: el.querySelector('.bubble')?.innerText || ''
  }));
  save('chatHistory', msgs);
  save('chatState', { items: state.items, shown: state.shown, lastRecipe: state.lastRecipe });
}

function restoreChat() {
  const history = load('chatHistory', []);
  const savedState = load('chatState', {});
  if (history.length > 0) {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('inputArea').style.display = 'block';
    history.forEach(msg => {
      if (msg.type === 'user') addUserMessage(msg.text, true);
      else addBotMessage(msg.text, true);
    });
    if (savedState.items) state.items = savedState.items;
    if (savedState.shown) state.shown = savedState.shown;
    if (savedState.lastRecipe) state.lastRecipe = savedState.lastRecipe;
    if (state.lastRecipe) {
      showQuickReplies(['✅ 作った', '⏭ 作らなかった', '🔄 別のレシピ', '⭐ お気に入り', '↩️ リセット']);
    }
    scrollBottom();
  }
}

// ============================================================
// 使い方
// ============================================================
function showHelp() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('inputArea').style.display = 'block';
  addBotMessage('📖 使い方ガイド\n\n【基本の使い方】\n1. 今日の特売品を入力して送信\n   例：鶏もも肉、大根、豆腐\n\n2. AIがレシピを1品提案します\n\n3. 作ったら「✅ 作った」をタップ\n   →1ヶ月同じレシピが出なくなります\n\n【便利な機能】\n🚫 NG食材：苦手な食材を登録して除外\n🔄 別のレシピ：違うレシピに変更\n↩️ リセット：食材を入力し直す\n🍱 余り食材：使わなかった食材の活用アイデアも自動提案\n追加 ○○：食材を追加して再提案\n\n準備ができたら特売品を入力してください！');
  document.getElementById('inputBox').focus();
}

// ============================================================
// お気に入り
// ============================================================
function openFavModal() {
  const favorites = load('favorites', []);
  const list = document.getElementById('favList');
  list.innerHTML = '';
  if (favorites.length === 0) {
    list.innerHTML = '<p style="font-size:13px;color:#888;text-align:center;padding:20px;">まだお気に入りはありません。<br>レシピ提案後に「⭐ お気に入り」をタップして保存できます。</p>';
  } else {
    favorites.slice().reverse().forEach((f, i) => {
      const idx = favorites.length - 1 - i;
      const div = document.createElement('div');
      div.style.cssText = 'border:1.5px solid #eee;border-radius:12px;padding:14px;position:relative;';
      div.innerHTML = `
        <div style="font-size:13px;font-weight:900;margin-bottom:6px;padding-right:24px;">⭐ ${f.name}</div>
        <div style="font-size:11px;color:#888;margin-bottom:8px;">${new Date(f.savedAt).toLocaleDateString('ja-JP')}</div>
        <div style="font-size:11px;color:#555;white-space:pre-wrap;line-height:1.7;">${f.text}</div>
        <button onclick="deleteFav(${idx})" style="position:absolute;top:10px;right:10px;background:none;border:none;font-size:16px;cursor:pointer;color:#ccc;">✕</button>
      `;
      list.appendChild(div);
    });
  }
  document.getElementById('favModal').classList.add('open');
}
function closeFavModal() { document.getElementById('favModal').classList.remove('open'); }
function deleteFav(idx) {
  const favorites = load('favorites', []);
  favorites.splice(idx, 1);
  save('favorites', favorites);
  openFavModal();
}

// ============================================================
// NG食材
// ============================================================
function openNgModal() {
  const current = document.getElementById('ngCurrent');
  if (state.ngFoods.length > 0) {
    current.textContent = '現在：' + state.ngFoods.join('、');
    current.style.display = 'block';
  } else {
    current.style.display = 'none';
  }
  document.getElementById('ngInput').value = state.ngFoods.join('、');
  document.getElementById('ngModal').classList.add('open');
}
function closeNgModal() { document.getElementById('ngModal').classList.remove('open'); }
function saveNg() {
  const val = document.getElementById('ngInput').value.trim();
  state.ngFoods = val ? val.split(/[\n、,，]+/).map(s => s.trim()).filter(s => s.length > 0) : [];
  saveStorage();
  closeNgModal();
  if (state.ngFoods.length > 0) {
    addBotMessage(`NG食材を登録しました！\n${state.ngFoods.map(f => `・${f}`).join('\n')}`);
  } else {
    addBotMessage('NG食材をすべて削除しました！');
  }
}

// ============================================================
// 初期化
// ============================================================
window.addEventListener('load', () => {
  showConcept();
  restoreChat();
});
</script>
